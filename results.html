<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PTIT Exam - Kết quả</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/results.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo-row">
      <img src="assets/images/ptit.png" alt="PTIT" />
      <strong>KẾT QUẢ THI</strong>
    </div>
    <div style="display:flex; gap:8px; align-items:center;">
      <a class="btn btn-outline btn-sm" href="home.html" style="color:#fff; border-color: rgba(255,255,255,.45);">Về trang chủ</a>
      <button class="btn btn-ghost btn-sm" id="btn-logout" type="button" style="color:#fff;">Đăng xuất</button>
    </div>
  </header>

  <main class="main-area container">
    <section class="result-hero" id="result-hero">
      <div class="score-circle">
        <strong id="result-score">0.0</strong>
        <span id="result-score-total">/10</span>
      </div>
      <h2 id="result-title" style="font-size: 1.35rem; font-weight: 800;">Kết quả bài thi</h2>
      <p id="result-subtitle" style="margin-top: 5px; opacity: .9;"></p>
    </section>

    <section class="result-stats" id="result-stats"></section>

    <section class="card" style="margin-bottom: 18px;">
      <div class="card-head">
        <h3>Chi tiết câu trả lời</h3>
      </div>
      <div class="card-body" id="review-area"></div>
    </section>

    <section class="card">
      <div class="card-head">
        <h3>Lịch sử bài thi của bạn</h3>
      </div>
      <div class="card-body" style="padding:0;">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Bài thi</th>
                <th>Loại</th>
                <th>Điểm</th>
                <th>Câu đúng</th>
                <th>Thời gian</th>
                <th>Ngày thi</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="history-tbody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="assets/js/pages/results-page.js"></script>
</body>
</html>
