<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PTIT Exam - Đăng nhập</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>
  <div class="auth-wrap">
    <aside class="auth-brand">
      <img src="assets/images/ptit.png" alt="PTIT" class="brand-logo" />
      <h1>PTIT EXAM SYSTEM</h1>
      <p>Đăng nhập để tiếp tục học tập và thi trực tuyến.</p>
    </aside>

    <main class="auth-form">
      <section class="card auth-card">
        <h2>Đăng nhập</h2>
        <p class="subtitle">Vui lòng dùng tài khoản sinh viên để vào hệ thống.</p>

        <form id="login-form" class="form-grid" novalidate>
          <div class="field" id="field-login-user">
            <label class="form-label" for="login-user">Tên đăng nhập</label>
            <input class="form-control" id="login-user" type="text" placeholder="Nhập tài khoản" />
            <div class="form-error">Vui lòng nhập tên đăng nhập.</div>
          </div>
          <div class="field" id="field-login-pass">
            <label class="form-label" for="login-pass">Mật khẩu</label>
            <input class="form-control" id="login-pass" type="password" placeholder="Nhập mật khẩu" />
            <div class="form-error">Vui lòng nhập mật khẩu.</div>
          </div>
          <div class="auth-rows">
            <button class="btn btn-primary btn-full" type="submit">Đăng nhập</button>
            <button class="btn btn-outline btn-full" id="btn-demo-student" type="button">Đăng nhập demo (SV)</button>
          </div>
        </form>

        <p class="auth-footnote">
          Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </p>
        <p class="auth-footnote" style="margin-top: 8px;">
          Là quản trị viên? <a href="admin/login.html">Đăng nhập Admin</a>
        </p>
      </section>
    </main>
  </div>

  <script type="module" src="assets/js/pages/login-page.js"></script>
</body>
</html>
