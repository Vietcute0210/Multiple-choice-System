<!DOCTYPE html>
<!-- Trang exam-edit.html -->

<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PTIT Admin - Exam Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/admin/admin-base.css" />
  <link rel="stylesheet" href="../assets/css/admin/exam-edit.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <img src="../assets/images/ptit.png" alt="PTIT" />
        <div><strong>PTIT ADMIN</strong><small>Exam Management</small></div>
      </div>
      <nav class="admin-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="exams.html">Quản lý kỳ thi</a>
        <a class="active" href="exam-edit.html">Tạo / sửa kỳ thi</a>
        <a href="users.html">Quản lý sinh viên</a>
        <a href="statistics.html">Thống kê</a>
        <a href="student-results.html">KQ theo sinh viên</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <h1 id="editor-title">Tạo kỳ thi mới</h1>
        <div style="display:flex; gap:8px;">
          <a class="btn btn-outline btn-sm" href="exams.html">Về danh sách</a>
          <button class="btn btn-outline btn-sm" id="btn-admin-logout" type="button">Đăng xuất</button>
        </div>
      </header>

      <div class="admin-body">
        <section class="card">
          <div class="card-head"><h3>Thông tin kỳ thi</h3></div>
          <div class="card-body">
            <div class="form-grid-2">
              <div class="field"><label class="form-label" for="ef-name">Tên kỳ thi *</label><input class="form-control" id="ef-name" /></div>
              <div class="field"><label class="form-label" for="ef-subject">Môn học *</label><input class="form-control" id="ef-subject" /></div>
              <div class="field"><label class="form-label" for="ef-type">Loại kỳ thi</label><select class="form-control" id="ef-type"><option>Luyện tập</option><option>Giữa kỳ</option><option>Cuối kỳ</option></select></div>
              <div class="field"><label class="form-label" for="ef-duration">Thời gian (phút) *</label><input class="form-control" id="ef-duration" type="number" min="1" /></div>
              <div class="field"><label class="form-label" for="ef-status">Trạng thái</label><select class="form-control" id="ef-status"><option value="free">Tự do</option><option value="scheduled">Có lịch</option><option value="active">Đang mở</option><option value="closed">Đã đóng</option></select></div>
              <div class="field"><label class="form-label" for="ef-desc">Mô tả</label><textarea class="form-control" id="ef-desc" rows="3"></textarea></div>
            </div>
          </div>
        </section>

        <section class="card">
          <div class="card-head">
            <h3>Danh sách câu hỏi (<span id="q-count">0</span>)</h3>
            <div style="display:flex; gap:8px;">
              <button class="btn btn-outline btn-sm" id="btn-import" type="button">Import mẫu</button>
              <button class="btn btn-navy btn-sm" id="btn-add-q" type="button">+ Thêm câu</button>
            </div>
          </div>
          <div class="card-body">
            <div id="q-editor-list"></div>
            <div style="margin-top: 14px; display:flex; gap:8px;">
              <button class="btn btn-primary" id="btn-save-exam" type="button">Lưu kỳ thi</button>
              <a class="btn btn-outline" href="exams.html">Hủy</a>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script type="module" src="../assets/js/admin/exam-edit-page.js"></script>
</body>
</html>
