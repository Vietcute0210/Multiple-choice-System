<!DOCTYPE html>
<!-- Trang dashboard.html -->

<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PTIT Admin - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/admin/admin-base.css" />
  <link rel="stylesheet" href="../assets/css/admin/dashboard.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <img src="../assets/images/ptit.png" alt="PTIT" />
        <div><strong>PTIT ADMIN</strong><small>Exam Management</small></div>
      </div>
      <nav class="admin-nav">
        <a class="active" href="dashboard.html">Dashboard</a>
        <a href="exams.html">Quản lý kỳ thi</a>
        <a href="exam-edit.html">Tạo / sửa kỳ thi</a>
        <a href="users.html">Quản lý sinh viên</a>
        <a href="statistics.html">Thống kê</a>
        <a href="student-results.html">KQ theo sinh viên</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <h1>Dashboard tổng quan</h1>
        <button class="btn btn-outline btn-sm" id="btn-admin-logout" type="button">Đăng xuất</button>
      </header>

      <div class="admin-body">
        <section id="kpi-grid" class="kpi-grid"></section>

        <section class="split-2">
          <article class="card">
            <div class="card-head"><h3>Tỷ lệ điểm số</h3></div>
            <div class="card-body"><div class="chart-box"><canvas id="chart-score-dist"></canvas></div></div>
          </article>
          <article class="card">
            <div class="card-head"><h3>Lượt thi theo kỳ thi</h3></div>
            <div class="card-body"><div class="chart-box"><canvas id="chart-exam-bar"></canvas></div></div>
          </article>
        </section>

        <section class="card">
          <div class="card-head">
            <h3>Kỳ thi gần đây</h3>
            <a class="btn btn-outline btn-sm" href="exams.html">Xem tất cả</a>
          </div>
          <div class="card-body" style="padding:0;">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Tên kỳ thi</th>
                    <th>Môn học</th>
                    <th>Loại</th>
                    <th>Lượt thi</th>
                    <th>Trạng thái</th>
                  </tr>
                </thead>
                <tbody id="recent-exams-tbody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script type="module" src="../assets/js/admin/dashboard-page.js"></script>
</body>
</html>
