<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PTIT Admin - Student Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/admin/admin-base.css" />
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <img src="../assets/images/ptit.png" alt="PTIT" />
        <div><strong>PTIT ADMIN</strong><small>Exam Management</small></div>
      </div>
      <nav class="admin-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="exams.html">Quản lý kỳ thi</a>
        <a href="exam-edit.html">Tạo / sửa kỳ thi</a>
        <a href="users.html">Quản lý sinh viên</a>
        <a href="statistics.html">Thống kê</a>
        <a class="active" href="student-results.html">KQ theo sinh viên</a>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <h1>Kết quả theo sinh viên</h1>
        <button class="btn btn-outline btn-sm" id="btn-admin-logout" type="button">Đăng xuất</button>
      </header>

      <div class="admin-body">
        <section class="card">
          <div class="card-body" style="display:flex; gap:8px; flex-wrap:wrap;">
            <input class="form-control" id="student-search" style="min-width: 260px; flex:1;" placeholder="Tìm theo tên hoặc MSSV..." />
            <button class="btn btn-navy" id="btn-search" type="button">Tìm kiếm</button>
          </div>
        </section>

        <section id="student-results-area"></section>
      </div>
    </main>
  </div>

  <script type="module" src="../assets/js/admin/student-results-page.js"></script>
</body>
</html>
