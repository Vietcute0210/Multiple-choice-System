<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PTIT Exam - Làm bài thi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/exam.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo-row">
      <img src="assets/images/ptit.png" alt="PTIT" />
      <strong id="exam-page-title">Bài thi</strong>
    </div>
    <div style="display: flex; gap: 8px; align-items: center;">
      <div id="timer-chip" class="timer-chip">00:00</div>
      <a class="btn btn-outline btn-sm" href="home.html" style="color: #fff; border-color: rgba(255,255,255,.4);">Thoát</a>
    </div>
  </header>

  <main class="main-area container">
    <div class="exam-layout">
      <section class="exam-panel">
        <div class="exam-header">
          <div class="exam-title" id="exam-title">Tên bài thi</div>
          <p class="exam-subtitle" id="exam-subject">Môn học</p>
        </div>

        <div id="question-area"></div>

        <div style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;">
          <button class="btn btn-outline" id="btn-prev" type="button">Câu trước</button>
          <button class="btn btn-navy" id="btn-next" type="button">Câu sau</button>
          <button class="btn btn-primary" id="btn-submit" type="button" style="margin-left: auto;">Nộp bài</button>
        </div>
      </section>

      <aside class="exam-sidebar">
        <section class="card">
          <div class="card-body">
            <h3 style="font-size: .9rem; color: var(--ptit-navy); margin-bottom: 8px;">Tiến độ làm bài</h3>
            <div class="progress"><div id="progress-bar" class="progress-bar"></div></div>
            <p id="progress-text" style="font-size: .78rem; color: var(--text-muted); margin-top: 6px;">0 / 0 câu</p>
          </div>
        </section>
        <section class="card">
          <div class="card-body">
            <h3 style="font-size: .9rem; color: var(--ptit-navy); margin-bottom: 10px;">Danh sách câu hỏi</h3>
            <div id="q-nav-grid" class="q-nav-grid"></div>
          </div>
        </section>
      </aside>
    </div>
  </main>

  <script type="module" src="assets/js/pages/exam-page.js"></script>
</body>
</html>
